name: Bug report
description: Report something that's broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. A couple of things before you start:

        - If this involves a **security or trust-boundary issue** — untrusted content leaking
          somewhere it shouldn't, a way to make an agent act on injected instructions, or anything
          like that — please **don't file it here**. Use [private vulnerability
          reporting](../../security/advisories/new) instead; see `SECURITY.md` for what counts.
        - **Never paste raw content from your work sources** into this form — no meeting titles,
          email or message bodies, issue titles/bodies, or anything else that came from a
          calendar, inbox, or tracker. See the redaction note below.

  - type: input
    id: version
    attributes:
      label: rundown version
      description: Output of `rundown --version`.
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Your OS and architecture.
      options:
        - macOS arm64
        - macOS x64
        - Linux x64
        - Linux arm64
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What you expected instead
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, in order.
      placeholder: |
        1. rundown init
        2. rundown login
        3. rundown brief --window today
        4. ...
    validations:
      required: true

  - type: textarea
    id: status-output
    attributes:
      label: "`rundown status` output (redacted)"
      description: >
        Paste the output of `rundown status` — it's limited to source names, item counts, and
        auth/readiness state, so it's safe to share as-is. Do NOT paste Brief content, raw source
        data, or anything else that came from your calendar/mail/issues/chat. If the bug is about
        something a source returned (a meeting title, email body, issue text, etc.), that's a
        trust-boundary matter — report it via `SECURITY.md`'s private channel instead of here.
      render: text

  - type: checkboxes
    id: confirm-no-raw-content
    attributes:
      label: Confirmation
      options:
        - label: I confirm this report contains no raw content from my work sources.
          required: true
