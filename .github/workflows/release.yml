# Release pipeline (ADR-0001 §2–§3, §7–§8): release-please owns versioning and the
# changelog. On every push to main it maintains a "release PR" that turns the
# Conventional Commits since the last release into a semver bump + CHANGELOG.md
# entry. Merging that PR creates the vX.Y.Z tag and the GitHub Release; the assets
# job then cross-compiles the 4 binaries and uploads the 9 assets (4 binaries +
# 4 .sha256 + install.sh) onto that release. The semver is stamped into each
# binary from the tag via --define (source runs print 0.0.0-dev).
#
# Why the build lives here, gated on release_created (not a separate tag-triggered
# workflow): a release/tag created with the default GITHUB_TOKEN does not trigger
# further workflow runs, so the build must hang off this same run.
name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Author the release PR as a GitHub App rather than github-actions[bot]. A
      # PR from the default token stalls on "approve workflows to run" before its
      # required CI check can report; a PR from the App triggers CI without that
      # gate. App id lives in the RELEASE_PLEASE_APP_ID variable, the private key
      # in the RELEASE_PLEASE_APP_PRIVATE_KEY secret.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # A broken tree must not release: same gates as ci.yml.
      - name: Typecheck (load-bearing for the Untrusted<T> trust boundary — ADR-0004 §3)
        run: bun x tsc --noEmit
      - name: Unit tests
        run: bun test
      - name: Build four-target binaries with version stamp (ADR-0001 §3, §7)
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            bun build --compile --target="bun-${target}" \
              --define "RUNDOWN_VERSION=\"${VERSION}\"" \
              src/cli.ts --outfile "dist/rundown-${target}"
          done
      - name: Checksums (ADR-0001 §2)
        # Run inside dist/ so each .sha256 names the bare asset, making
        # `sha256sum -c` / `shasum -a 256 -c` work after download.
        run: |
          cd dist
          for f in rundown-darwin-arm64 rundown-darwin-x64 rundown-linux-x64 rundown-linux-arm64; do
            sha256sum "$f" > "$f.sha256"
          done
      - name: Upload 9 assets onto the release release-please created (ADR-0001 §2, §8)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" \
            dist/rundown-darwin-arm64 dist/rundown-darwin-arm64.sha256 \
            dist/rundown-darwin-x64 dist/rundown-darwin-x64.sha256 \
            dist/rundown-linux-x64 dist/rundown-linux-x64.sha256 \
            dist/rundown-linux-arm64 dist/rundown-linux-arm64.sha256 \
            install.sh
